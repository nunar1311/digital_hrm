  # Digital HRM Application - Development Mode
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: digital_hrm_app_dev
    restart: unless-stopped
    # depends_on:
    #   db:
    #     condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres123}@db:5432/${POSTGRES_DB:-digital_hrm_dev}?schema=public&sslmode=prefer}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dev-better-auth-secret}
    ports:
      - "3000:3000"
    volumes:
      - ./uploads:/app/uploads:rw
      - .:/app:rw
      - /app/node_modules
      - /app/.next
    networks:
      - digital_hrm_dev_network

networks:
  digital_hrm_dev_network:
    driver: bridge

volumes:
  postgres_dev_data:
