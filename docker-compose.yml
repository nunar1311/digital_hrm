services:
  # PostgreSQL Database
  db:
    image: postgres:14-alpine
    container_name: digital_hrm_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      POSTGRES_DB: ${POSTGRES_DB:-digital_hrm}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - digital_hrm_network

  # Redis Cache (Optional - for session management)
  redis:
    image: redis:7-alpine
    container_name: digital_hrm_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - digital_hrm_network

  # Digital HRM Application
  app:
    image: digital_hrm_app_prod
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres123}@db:5432/${POSTGRES_DB:-digital_hrm}?schema=public&sslmode=disable}
    container_name: digital_hrm_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres123}@db:5432/${POSTGRES_DB:-digital_hrm}?schema=public&sslmode=disable}
      REDIS_URL: redis://redis:6379
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-your-better-auth-secret-change-in-production}
      BETTER_AUTH_TRUSTED_ORIGINS: ${BETTER_AUTH_TRUSTED_ORIGINS:-}
      # AI Service Configuration
      AI_SERVICE_URL: http://ai-service:8000
      AI_SERVICE_KEY: ${AI_INTERNAL_API_KEY:-}
    ports:
      - "3000:3000"
    volumes:
      - ./uploads:/app/uploads:rw
    networks:
      - digital_hrm_network

  # pgAdmin for Database Management (Optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: digital_hrm_pgadmin
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@digitalhrm.vn
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - digital_hrm_network
    profiles:
      - admin

  # AI Service - Python Microservice for AI Integration
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: digital_hrm_ai
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      # AI Provider API Keys (configure in .env)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      # Database - Direct PostgreSQL access for AI analysis
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres123}@db:5432/${POSTGRES_DB:-digital_hrm}?sslmode=disable
      DB_POOL_MIN_SIZE: "2"
      DB_POOL_MAX_SIZE: "10"
      # Redis Configuration
      REDIS_URL: redis://redis:6379
      REDIS_ENABLED: "true"
      CACHE_TTL_SECONDS: "3600"
      # Rate Limiting
      RATE_LIMIT_PER_MINUTE: "60"
      RATE_LIMIT_PER_DAY: "1000"
      # AI Defaults
      DEFAULT_PROVIDER: ${AI_DEFAULT_PROVIDER:-openai}
      DEFAULT_MODEL: ${AI_DEFAULT_MODEL:-gpt-4o}
      REQUEST_TIMEOUT_SECONDS: "120"
      # Internal Auth
      INTERNAL_API_KEY: ${AI_INTERNAL_API_KEY:-}
      NEXT_PUBLIC_API_URL: http://app:3000
      # Logging
      LOG_LEVEL: ${AI_LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    networks:
      - digital_hrm_network
    profiles:
      - ai

networks:
  digital_hrm_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:
